# 公共参数
case_common:
  allureEpic: 接口自动化
  allureFeature: 购物车
  allureStory: 购物车相关接口

carts_01:
    host: ${{host()}}
    url: /v1/carts
    method: POST
    detail: 添加商品到购物车
    headers: $cache{headers}
    requestType: json
    # 是否执行，空或者 true 都会执行
    is_run:
    data:
      num: 1
      pro_id: 46229
      # 是否有依赖业务，为空或者false则表示没有
    dependence_case: False
        # 依赖的数据
    dependence_case_data:
    assert:
      # 断言接口状态码
      status_code: 200
      msgCode:
        jsonpath: $.message
        type: ==
        value: "创建成功"
        AssertType:

carts_02:
    host: ${{host()}}
    url: /v1/carts
    method: POST
    detail: 从购物车删除商品
    headers: $cache{headers}
    requestType: json
    # 是否执行，空或者 true 都会执行
    is_run:
    data:
      num: -1
      pro_id: 46229
      # 是否有依赖业务，为空或者false则表示没有
    dependence_case: False
        # 依赖的数据
    dependence_case_data:
    assert:
      # 断言接口状态码
      status_code: 200
      msgCode:
        jsonpath: $.message
        type: ==
        value: "创建成功"
        AssertType:
      errorCode:
        jsonpath: $.code
        type: ==
        value: 0
        AssertType:


