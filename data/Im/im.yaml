# 公共参数
case_common:
  allureEpic: 接口自动化
  allureFeature: 聊天模块
  allureStory: im相关接口

im_01:
    host: ${{host()}}
    url: /v2/api/im/text
    method: POST
    detail: 发送文字聊天
    headers:
      Content-Type: application/json;
      authorization: $cache{authorization}
    # 请求的数据，是 params 还是 json、或者file、data
    requestType: json
    # 是否执行，空或者 true 都会执行
    is_run:
    data:
      to: '1680884089557864448'
      text: ${{random_paragraph()}}
      # 是否有依赖业务，为空或者false则表示没有
    dependence_case: False
        # 依赖的数据
    dependence_case_data:
    assert:
      status_code: 200

