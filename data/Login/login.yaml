# 公共参数
case_common:
  allureEpic: 接口自动化
  allureFeature: 登录模块
  allureStory: 短信验证码登录

login_01:
    host: ${{host()}}
    url: /v1/api/user/app/auth
    method: POST
    detail: 正常登录
    headers:
      Content-Type: application/json;
    # 请求的数据，是 params 还是 json、或者file、data
    requestType: json
    # 是否执行，空或者 true 都会执行
    is_run:
    data:
      phone: '18988494026'
      smsCode: '1812'
      # 是否有依赖业务，为空或者false则表示没有
    dependence_case: False
        # 依赖的数据
    dependence_case_data:
    assert:
      # 断言接口状态码
      id:
        jsonpath: $.id
        type: ==
        value: "1676945642748665856"
        AssertType:

login_02:
    host: ${{host()}}
    url: /v1/api/user/app/auth
    method: POST
    detail: 输入错误的验证码
    headers:
      Content-Type: application/json;
    # 请求的数据，是 params 还是 json、或者file、data
    requestType: json
    # 是否执行，空或者 true 都会执行
    is_run:
    data:
      phone: '18988494026'
      smsCode: '1811'
      # 是否有依赖业务，为空或者false则表示没有
    dependence_case: False
        # 依赖的数据
