login_03:
    host: ${{host()}}
    url: /v2/api/content/app/likeOrUnset
    method: POST
    detail: 点赞
    headers:
      Content-Type: application/json;
      authorization: $cache{authorization}
    # 请求的数据，是 params 还是 json、或者file、data
    requestType: json
    # 是否执行，空或者 true 都会执行
    is_run:
    data:
      contentId: '1701460673146544128'
      # 是否有依赖业务，为空或者false则表示没有
    dependence_case: False
        # 依赖的数据
    dependence_case_data:
    assert:
      status_code: 200