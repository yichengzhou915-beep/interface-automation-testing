order_06:
    host: ${{host()}}
    url: /v2/api/contentorder/app/close
    method: POST
    detail: 关闭待支付订单
    headers:
      Content-Type: application/json;
      authorization: $cache{authorization}
    # 请求的数据，是 params 还是 json、或者file、data
    requestType: json
    # 是否执行，空或者 true 都会执行
    is_run:
    data:
      contentOrderId: $cache{order_id}
      # 是否有依赖业务，为空或者false则表示没有
    dependence_case: True
        # 依赖的数据
    dependence_case_data:
      - case_id: order_02
        dependent_data:
          - dependent_type: response
            jsonpath: $.items.[0].id
            set_cache: order_id
    assert:
      # 断言接口状态码
      status_code: 200


