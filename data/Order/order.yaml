order_01:
    host: ${{host()}}
    url: /v2/api/contentorder/app/pageable?page=1&pageSize=10&filter=&serveOrDemand=serve
    method: POST
    detail: 查看我的服务订单
    headers:
      Content-Type: application/json;
      authorization: $cache{authorization}
    # 请求的数据，是 params 还是 json、或者file、data
    requestType: json
    # 是否执行，空或者 true 都会执行
    is_run:
    data:
      # 是否有依赖业务，为空或者false则表示没有
    dependence_case: False
        # 依赖的数据
    dependence_case_data:
    assert:
      # 断言接口状态码
      status_code: 200

