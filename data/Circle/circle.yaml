# 公共参数
case_common:
  allureEpic: 接口自动化
  allureFeature: 造小圈模块
  allureStory: 造小圈相关接口

circle_01:
    host: ${{host()}}
    url: /v2/api/socialCircle/app/content/square
    method: POST
    detail: 未登录查看造小圈推荐帖子
    headers:
      Content-Type: application/json;
    # 请求的数据，是 params 还是 json、或者file、data
    requestType: json
    # 是否执行，空或者 true 都会执行
    is_run:
    data:
      page: 1
      pageSize: 35
      clientId: '85830a94-ba0d-5d6b-8a4f-77be09ef223b'
      # 是否有依赖业务，为空或者false则表示没有
    dependence_case: False
        # 依赖的数据
    dependence_case_data:
    assert:
      # 断言接口状态码
      status_code: 200

